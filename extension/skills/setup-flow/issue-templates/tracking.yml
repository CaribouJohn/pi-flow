name: Tracking — umbrella issue
description: A multi-slice track. The umbrella is never worked directly; it tracks the children.
title: "[track] "
labels: ["tracking"]
body:
  - type: markdown
    attributes:
      value: |
        Tracking issues are containers. They hold the goal of a multi-slice
        track and link to the child slices (one issue per vertical-slice tracer
        bullet). The umbrella itself stays in `tracking` and is never picked up
        by an agent — only the children move through the state machine.
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: One paragraph. What will be true when this track is done?
      placeholder: |
        Ship the `/flow setup` interactive bootstrap so a fresh repo can adopt
        pi-flow in one command (labels + profile + issue templates + smoke).
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope / non-goals
      description: What's explicitly in, what's explicitly out, and why.
  - type: textarea
    id: slices
    attributes:
      label: Slices
      description: |
        Tick as child issues land. Use the slice template (`[slice] …`) for
        each one. Reference the slice number after filing.
      value: |
        - [ ] C1 — …
        - [ ] C2 — …
        - [ ] C3 — …
        - [ ] accept — human acceptance gate
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance
      description: How a human will know the integrated track is done.
      placeholder: |
        Throwaway clone: `/flow setup` walks end-to-end without errors;
        `.pi/flow.profile.md` parses; templates show in GitHub UI; smoke
        line prints green.
